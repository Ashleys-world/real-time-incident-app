name: Deploy Backend

on:
  push:
    branches: [main, feat/deploy-phase-2]
    paths:
      - 'real-time-incident-backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore real-time-incident-backend/IncidentApp.Api/IncidentApp.Api.csproj

      - name: Build
        run: dotnet build real-time-incident-backend/IncidentApp.Api/IncidentApp.Api.csproj --configuration Release --no-restore

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Run database migrations
        run: |
          dotnet ef database update \
            --project real-time-incident-backend/IncidentApp.Infrastructure/IncidentApp.Infrastructure.csproj \
            --startup-project real-time-incident-backend/IncidentApp.Api/IncidentApp.Api.csproj \
            --no-build
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.DB_CONNECTION_STRING }}

      - name: Publish
        run: dotnet publish real-time-incident-backend/IncidentApp.Api/IncidentApp.Api.csproj --configuration Release --no-build --output ./publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
