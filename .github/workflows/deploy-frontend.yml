name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'real-time-incident-frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: real-time-incident-frontend/incident-app/package-lock.json

      - name: Install dependencies
        working-directory: real-time-incident-frontend/incident-app
        run: npm ci

      - name: Build
        working-directory: real-time-incident-frontend/incident-app
        run: npm run build -- --configuration production

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: real-time-incident-frontend/incident-app
          output_location: dist/incident-app
          skip_app_build: true
